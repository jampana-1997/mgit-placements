<!DOCTYPE html>
<html>
<head>

<title>MGIT Training and placement</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial, sans-serif;
padding:15px;
overflow-x:hidden;
color:white;
background:linear-gradient(-45deg,#0f2027,#203a43,#2c5364,#1c1c3c);
background-size:400% 400%;
animation:bgMove 15s ease infinite;
min-height:100vh;
}

/* Animated Background */

@keyframes bgMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* Floating Glow */

body::before{
content:"";
position:fixed;
width:500px;
height:500px;
background:rgba(0,198,255,0.15);
border-radius:50%;
top:-120px;
left:-120px;
filter:blur(100px);
animation:float1 10s infinite alternate;
z-index:-1;
}

body::after{
content:"";
position:fixed;
width:400px;
height:400px;
background:rgba(255,0,150,0.15);
border-radius:50%;
bottom:-100px;
right:-100px;
filter:blur(100px);
animation:float2 12s infinite alternate;
z-index:-1;
}

@keyframes float1{
from{transform:translateY(0px);}
to{transform:translateY(80px);}
}

@keyframes float2{
from{transform:translateX(0px);}
to{transform:translateX(-80px);}
}

/* HEADER */

.header-box{

background:linear-gradient(135deg,#000814,#001d3d,#003566);

padding:6px 10px;

border-radius:18px 18px 0 0;

margin-bottom:0;

box-shadow:0 6px 20px rgba(0,0,0,0.35);

border:1px solid rgba(255,255,255,0.15);

border-bottom:none;

text-align:center;

}


/* HEADINGS */

h1{

font-size:34px;

font-weight:bold;

background:linear-gradient(90deg,#ffffff,#ffe082,#ffffff);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

margin-bottom:8px;

letter-spacing:1px;

}

h3{

font-size:18px;
margin-top:2px;
font-weight:500;

background:linear-gradient(90deg,#b2ff59,#00e5ff);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

}

/* STATS */

.stats{

margin:0;

font-weight:bold;

font-size:18px;

display:flex;

justify-content:center;

gap:25px;

flex-wrap:wrap;

padding:8px 12px;

background: linear-gradient(135deg, #064420, #0b6b35);

border-radius:0;

box-shadow:none;

border-left:1px solid rgba(255,255,255,0.15);

border-right:1px solid rgba(255,255,255,0.15);

color:white;

}

/* FILTER SECTION */

.controls{

margin-bottom:6px;

display:flex;

flex-wrap:nowrap;

gap:6px;

background:rgba(255,255,255,0.12);

padding:6px 8px;

border-radius:0 0 14px 14px;

backdrop-filter:blur(10px);

box-shadow:0 6px 20px rgba(0,0,0,0.25);

border:1px solid rgba(255,255,255,0.15);

border-top:none;

overflow-x:auto;

overflow-y:hidden;

scroll-behavior:smooth;

}
/* FILTERS */

.controls input,
.controls select{

flex:0 0 auto;

width:170px;
min-width:170px;

height:30px;

padding:4px 8px;

font-size:12px;

border-radius:8px;

border:1px solid rgba(255,255,255,0.2);

outline:none;

background:rgba(255,255,255,0.92);

transition:0.3s;

}

/* FOCUS */

.controls input:focus,
.controls select:focus{

transform:scale(1.02);

box-shadow:0 0 10px rgba(255,255,255,0.5);

border:1px solid #00c6ff;

}

/* FILTER SCROLLBAR */

.controls::-webkit-scrollbar{
height:7px;
}

.controls::-webkit-scrollbar-track{
background:rgba(255,255,255,0.08);
border-radius:10px;
}

.controls::-webkit-scrollbar-thumb{
background:linear-gradient(90deg,#00c6ff,#0072ff);
border-radius:10px;
}

/* TABLE CONTAINER */

.table-container{

width:100%;

overflow-x:auto;

overflow-y:hidden;

border-radius:18px;

box-shadow:0 8px 25px rgba(0,0,0,0.35);

scroll-behavior:smooth;

background:rgba(255,255,255,0.05);

padding-bottom:6px;

}

/* TABLE SCROLLBAR */

.table-container::-webkit-scrollbar{

height:10px;

}

.table-container::-webkit-scrollbar-track{

background:rgba(255,255,255,0.08);

border-radius:10px;

}

.table-container::-webkit-scrollbar-thumb{

background:linear-gradient(90deg,#ff512f,#dd2476);

border-radius:10px;

}

.table-container::-webkit-scrollbar-thumb:hover{

background:linear-gradient(90deg,#00c6ff,#0072ff);

}

/* TABLE */

table{

border-collapse:collapse;

min-width:1600px;

width:max-content;

background:#ffffff;

color:#222;

border-radius:18px;

overflow:hidden;

}

/* TABLE HEADER */

th{

padding:8px 9px;

font-size:13px;

font-weight:bold;

text-align:center;

background:linear-gradient(135deg,#141e30,#243b55);

color:#ffffff;
line-height:1.3;
border:1px solid rgba(255,255,255,0.12);

white-space:nowrap;

}

/* TABLE DATA */

td{

padding:5px 9px;

font-size:12px;

font-weight:500;

text-align:center;

white-space:nowrap;

border:1px solid rgba(16,37,66,0.12);

}

/* ROW COLORS */

tr:nth-child(even){

background:#eef5ff;

}

tr:nth-child(odd){

background:#ffffff;

}

/* HOVER */

tbody tr:hover{

background:#ffd180;

transition:0.3s;

}

/* BUTTON */

.link-btn{

background:linear-gradient(135deg,#667eea,#764ba2);

color:white;

padding:3px 8px;

border-radius:6px;

text-decoration:none;

font-size:10px;

font-weight:bold;
 
line-height:1.2;

display:inline-block;

transition:0.3s;

box-shadow:0 3px 10px rgba(0,0,0,0.2);

}

.link-btn:hover{

transform:scale(1.06);

background:linear-gradient(135deg,#43cea2,#185a9d);

}

/* MOBILE */

@media(max-width:768px){

body{
padding:10px;
}

h1{
font-size:22px;
}

h3{
font-size:15px;
}

.stats{

font-size:13px;

gap:12px;

padding:6px;

}

.controls{

padding:5px;

gap:5px;

}

.controls input,
.controls select{

width:145px;
min-width:145px;

height:28px;
padding:3px 6px;
font-size:12px;

}

th{

font-size:11px;

padding:5px 6px;

}

td{

font-size:11px;

padding:4px 6px;

}

table{

min-width:1400px;

}

}
.dashboard{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(220px,1fr));

gap:15px;

margin:15px 0;

}

.card{

padding:18px;

border-radius:18px;

text-align:center;

color:#fff;

backdrop-filter:blur(12px);

transition:.35s;

box-shadow:0 8px 20px rgba(0,0,0,.3);

}

.card:hover{

transform:translateY(-6px) scale(1.03);

}

.card h2{

font-size:16px;

margin-bottom:10px;

}

.card h1{

font-size:32px;

}

.offers{
background:linear-gradient(135deg,#00c6ff,#0072ff);
}

.students{
background:linear-gradient(135deg,#00b09b,#96c93d);
}

.companies{
background:linear-gradient(135deg,#ff512f,#dd2476);
}

.highest{
background:linear-gradient(135deg,#8e2de2,#4a00e0);
}

.average{
background:linear-gradient(135deg,#f7971e,#ffd200);
}

.placement{
background:linear-gradient(135deg,#11998e,#38ef7d);
}
 .controls{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(170px,1fr));

gap:12px;

margin:20px 0;

padding:18px;

background:rgba(255,255,255,.08);

backdrop-filter:blur(15px);

border-radius:18px;

box-shadow:0 8px 25px rgba(0,0,0,.25);

}

.controls input,
.controls select{

height:42px;

border:none;

border-radius:12px;

padding:0 12px;

font-size:14px;

background:white;

transition:.3s;

}

.controls input:focus,
.controls select:focus{

transform:scale(1.03);

box-shadow:0 0 12px #00c6ff;

}

#resetFilters{

height:42px;

border:none;

border-radius:12px;

cursor:pointer;

font-weight:bold;

background:linear-gradient(135deg,#ff512f,#dd2476);

color:white;

transition:.3s;

}

#resetFilters:hover{

transform:scale(1.05);

}
</style>

</head>

<body>

<div class="header-box">

<h1>MGIT Training and placement </h1>

<h3>Academic Year 2K25 - 2k26</h3>

</div>

<div class="dashboard">

<div class="card offers">
<h2>Total Offers</h2>
<h1 id="totalOffers">0</h1>
</div>

<div class="card students">
<h2>Placed Students</h2>
<h1 id="placedStudents">0</h1>
</div>

<div class="card companies">
<h2>Companies</h2>
<h1 id="companyCount">0</h1>
</div>

<div class="card highest">
<h2>Highest Package</h2>
<h1 id="highestPackage">0 LPA</h1>
</div>

<div class="card average">
<h2>Average Package</h2>
<h1 id="averagePackage">0 LPA</h1>
</div>

<div class="card placement">
<h2>Placement %</h2>
<h1 id="placementPercent">0%</h1>
</div>

</div>

<div class="controls">

<input type="text" id="search" placeholder="🔍 Search Student / Roll / Company">

<select id="batchFilter">
<option value="">🎓 All Batches</option>
</select>

<select id="branchFilter">
<option value="">🏛️ All Branches</option>
</select>

<select id="companyFilter">
<option value="">🏢 All Companies</option>
</select>

<select id="natureFilter">
<option value="">💼 Company Nature</option>
</select>

<select id="internFilter">
<option value="">📄 Internship Type</option>
</select>

<select id="genderFilter">
<option value="">👤 Gender</option>
</select>

<select id="campusFilter">
<option value="">🌍 Campus Type</option>
<option>On Campus</option>
<option>Off Campus</option>
</select>

<input
type="number"
id="salaryFilter"
placeholder="💰 Minimum Package">

<button id="resetFilters">
Reset
</button>

</div>

<div class="table-container">

<table id="placementTable">

<thead></thead>

<tbody></tbody>

</table>

</div>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.2/papaparse.min.js"></script>

<script>

let allData = [];
const natureKey = "Nature of \nthe Company";
const internKey = "Paid/Unpaid\n Interns";


const csvURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSlQ0WjFcZaI2eiKVtAqynVqs3H82MznXaV15n-qLjsDv6QL75g_7sQAhm0n6ZtiiDVKIB0MkuTNQ64/pub?output=csv";

fetch(csvURL)
  .then(res => {
    if (!res.ok) throw new Error(res.status);
    return res.text();
  })
  .then(csv => {
    Papa.parse(csv, {
      header: true,
      skipEmptyLines: true,
      complete: function(results) {
        allData = results.data;
        buildTable(allData);
populateFilters(allData);
updateStats(allData);
applyFilters();
      }
    });
  })
  .catch(err => {
    console.error(err);
    alert("CSV Loading Failed: " + err);
  });

/* BUILD TABLE */

function buildTable(data){

let thead=document.querySelector("#placementTable thead");

let tbody=document.querySelector("#placementTable tbody");

thead.innerHTML="";

tbody.innerHTML="";

if(data.length===0){

tbody.innerHTML=
"<tr><td colspan='20'>No Records Found</td></tr>";

return;

}

let headers=Object.keys(data[0]);

let tr=document.createElement("tr");

/* HEADERS */

headers.forEach(h => {

  let th = document.createElement("th");
  th.innerText = h;

  th.style.cursor = "pointer";

  th.addEventListener("click", () => {
  sortTableByColumn(h, data);
});

  tr.appendChild(th);
});

thead.appendChild(tr);

/* ROWS */

data.forEach(row=>{

let tr=document.createElement("tr");

headers.forEach(h=>{

let td=document.createElement("td");

let value = row[h] ? row[h].toString().trim() : "";

if(value.includes("http")){

let a=document.createElement("a");

a.href=value;

a.target="_blank";

a.className="link-btn";

if(h.toLowerCase().includes("intern")){

a.innerText="📄 Internship Letter";

}

else if(h.toLowerCase().includes("offer")){

a.innerText="📄 Offer Letter";

}

else{

a.innerText="📄 View";

}

td.appendChild(a);

}

else{

td.innerText=value;

}

tr.appendChild(td);

});

tbody.appendChild(tr);

});

}

/* POPULATE FILTERS */

function populateFilters(data){

let batches=[
...new Set(data.map(d=>d["Batch"]).filter(Boolean))
];

let branches=[
...new Set(data.map(d=>d["Branch"]).filter(Boolean))
];

let companies=[
...new Set(data.map(d=>d["Company Placed"]).filter(Boolean))
];

let natures=[
...new Set(
data.map(d => (d[natureKey] || "").trim())
.filter(v=>v)
)
];

let interns=[
...new Set(
data.map(d => (d[internKey] || "").trim())
.filter(v=>v)
)
];

let genders=[
...new Set(
data.map(d => (d["Gender"] || "").trim())
.filter(v=>v)
)
];

/* SELECTS */

let batchSelect=document.getElementById("batchFilter");

let branchSelect=document.getElementById("branchFilter");

let companySelect=document.getElementById("companyFilter");

let natureSelect=document.getElementById("natureFilter");

let internSelect=document.getElementById("internFilter");

let genderSelect=document.getElementById("genderFilter");

/* RESET */

batchSelect.innerHTML='<option value="">All Batches</option>';

branchSelect.innerHTML='<option value="">All Branches</option>';

companySelect.innerHTML='<option value="">All Companies</option>';

natureSelect.innerHTML='<option value="">Nature of the Company</option>';

internSelect.innerHTML='<option value="">Internship Type</option>';

genderSelect.innerHTML='<option value="">All Genders</option>';

/* ADD OPTIONS */

batches.sort().forEach(v=>
batchSelect.add(new Option(v,v))
);

branches.sort().forEach(v=>
branchSelect.add(new Option(v,v))
);

companies.sort().forEach(v=>
companySelect.add(new Option(v,v))
);

natures.sort().forEach(v=>
natureSelect.add(new Option(v,v))
);

interns.sort().forEach(v=>
internSelect.add(new Option(v,v))
);

genders.sort().forEach(v=>
genderSelect.add(new Option(v,v))
);

}

function updateCompanyFilter(filteredData){

let companySelect =
document.getElementById("companyFilter");

/* CURRENT SELECTION */

let currentValue = companySelect.value;

/* UNIQUE COMPANIES */

let companies = [
...new Set(
filteredData
.map(d => d["Company Placed"])
.filter(Boolean)
)
];

/* RESET */

companySelect.innerHTML =
'<option value="">All Companies</option>';

/* ADD FILTERED OPTIONS */

companies.sort().forEach(v =>
companySelect.add(new Option(v,v))
);

/* RESTORE VALUE IF EXISTS */

if(companies.includes(currentValue)){

companySelect.value = currentValue;

}

}

/* UPDATE STATS */


/* APPLY FILTERS */

function updateStats(data){

document.getElementById("totalOffers").innerText=data.length;

let students=new Set();

let companies=new Set();

let highest=0;

let total=0;

let count=0;

data.forEach(r=>{

students.add(r["Roll Number"]);

if(r["Company Placed"])
companies.add(r["Company Placed"]);

let pkg=parseFloat(
(r["Salary package"]||"0")
.replace(/[^\d.]/g,"")
);

if(!isNaN(pkg)&&pkg>0){

total+=pkg;

count++;

if(pkg>highest)
highest=pkg;

}

});

document.getElementById("placedStudents").innerText=students.size;

document.getElementById("companyCount").innerText=companies.size;

document.getElementById("highestPackage").innerText=highest+" LPA";

document.getElementById("averagePackage").innerText=
(count?(total/count).toFixed(2):0)+" LPA";

let totalStudents = allData.length || 1;
let percent = ((students.size / totalStudents) * 100).toFixed(1);

document.getElementById("placementPercent").innerText=
percent+"%";

}
function sortTableByColumn(column, dataToSort) {
let sortDirection = {};
  sortDirection[column] = !sortDirection[column];
  let direction = sortDirection[column] ? 1 : -1;

  let sorted = [...dataToSort].sort((a, b) => {

    let valA = a[column] || "";
    let valB = b[column] || "";

    let numA = parseFloat(valA.toString().replace(/[^\d.]/g, ""));
    let numB = parseFloat(valB.toString().replace(/[^\d.]/g, ""));

    if (!isNaN(numA) && !isNaN(numB)) {
      return (numA - numB) * direction;
    }

    return valA.toString().localeCompare(valB.toString()) * direction;
  });

  buildTable(sorted);
  updateStats(sorted);
}
/* FILTER */

function applyFilters(){

let search=document.getElementById("search").value.toLowerCase();

let batch=document.getElementById("batchFilter").value;

let branch=document.getElementById("branchFilter").value;

let company=document.getElementById("companyFilter").value;

let nature=document.getElementById("natureFilter").value;

let intern=document.getElementById("internFilter").value;

let gender=document.getElementById("genderFilter").value;

let campus=document.getElementById("campusFilter").value;

let minSalary=parseFloat(document.getElementById("salaryFilter").value)||0;

let filtered=allData.filter(row=>{

let text=JSON.stringify(row).toLowerCase();

let salary=parseFloat((row["Salary package"]||"0").replace(/[^\d.]/g,""))||0;

let campusValue = "";

Object.keys(row).forEach(key=>{

if(key.includes("On Campus")){

campusValue = row[key] || "";

}

});

campusValue = campusValue.trim();
return text.includes(search)

&& (batch==="" || row["Batch"]===batch)

&& (branch==="" || row["Branch"]===branch)

&& (company==="" || row["Company Placed"]===company)

&& (nature==="" || (row[natureKey]||"").trim()===nature)

&& (intern==="" || (row[internKey]||"").trim()===intern)

&& (gender==="" || (row["Gender"]||"").trim()===gender)

&& (campus==="" || campusValue===campus)

&& (salary>=minSalary);

});

updateCompanyFilter(filtered);

buildTable(filtered);

updateStats(filtered);

}
/* EVENTS */

document.getElementById("search")
.addEventListener("keyup",applyFilters);

document.getElementById("batchFilter")
.addEventListener("change",applyFilters);

document.getElementById("branchFilter")
.addEventListener("change",applyFilters);

document.getElementById("companyFilter")
.addEventListener("change",applyFilters);

document.getElementById("natureFilter")
.addEventListener("change",applyFilters);

document.getElementById("internFilter")
.addEventListener("change",applyFilters);

document.getElementById("genderFilter")
.addEventListener("change",applyFilters);
document.getElementById("salaryFilter")
.addEventListener("keyup", applyFilters);

document.getElementById("campusFilter")
.addEventListener("change", applyFilters);
document.getElementById("resetFilters").addEventListener("click", function () {

    document.getElementById("search").value = "";
    document.getElementById("batchFilter").value = "";
    document.getElementById("branchFilter").value = "";
    document.getElementById("companyFilter").value = "";
    document.getElementById("natureFilter").value = "";
    document.getElementById("internFilter").value = "";
    document.getElementById("genderFilter").value = "";
    document.getElementById("campusFilter").value = "";
    document.getElementById("salaryFilter").value = "";

    buildTable(allData);
    populateFilters(allData);
    updateStats(allData);

});
</script>

</body>
</html>
